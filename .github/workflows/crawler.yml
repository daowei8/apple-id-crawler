name: Apple ID Crawler

on:
  schedule:
    - cron: "0 * * * *"   # 每1小时自动运行
  workflow_dispatch:        # 支持手动触发

concurrency:
  group: crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Chrome 浏览器
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫
        env:
          OUTPUT_FILE: apple_ids.json
        run: python scripts/crawler.py

      - name: 打印统计
        run: |
          python - <<'PYEOF'
          import json
          d = json.load(open("apple_ids.json"))
          print(f"📊 账号总数: {d['total']}")
          print(f"🕐 生成时间: {d['generated_at']}")
          print("📦 各站来源:")
          for src, cnt in d["source_stats"].items():
              print(f"   {src}: {cnt} 条")
          PYEOF

      - name: 提交数据到仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apple_ids.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            COUNT=$(python -c "import json; print(json.load(open('apple_ids.json'))['total'])")
            git commit -m "🤖 自动更新: ${COUNT} 个账号 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            # 重试最多5次，每次先 pull --rebase 再 push，解决并发冲突
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "第 ${i} 次 push 失败，等待后重试..."
              sleep $((i * 5))
            done
          fi
