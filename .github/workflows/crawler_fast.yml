name: Fast Crawler

on:
  schedule:
    - cron: "*/5 * * * *"   # 每5分钟（GitHub最短间隔）
  workflow_dispatch:

concurrency:
  group: fast-crawler
  cancel-in-progress: false

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: pip install requests -q

      - name: 运行快速爬虫
        env:
          OUTPUT_FILE: apple_ids.json
        run: python scripts/crawler_fast.py

      - name: 提交数据
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apple_ids.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过"
          else
            COUNT=$(python -c "import json; print(json.load(open('apple_ids.json'))['total'])")
            git commit -m "⚡ 快速更新: ${COUNT} 个账号 [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')]"
            git pull --rebase origin main
            git push
          fi
