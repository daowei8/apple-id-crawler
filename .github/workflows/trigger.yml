name: Trigger Crawler

on:
  schedule:
    - cron: "*/10 * * * *"  # 每10分钟触发一次
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 触发爬虫
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'crawler.yml',
              ref: 'main'
            });
            console.log('✅ 已触发爬虫运行');
