name: Apple ID Crawler

on:
  schedule:
    - cron: "*/10 * * * *"   # 每10分钟运行一次
  workflow_dispatch:           # 支持手动触发

concurrency:
  group: crawler
  cancel-in-progress: true    # 如果上一次还没跑完，直接取消，避免堆积

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # 超过8分钟强制终止，防止卡死

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml -q

      - name: 运行爬虫
        env:
          OUTPUT_FILE: apple_ids.json
        run: python crawler.py

      - name: 提交数据
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apple_ids.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过"
          else
            COUNT=$(python -c "import json; print(json.load(open('apple_ids.json'))['total'])")
            git commit -m "🤖 自动更新: ${COUNT} 个账号 [$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')]"
            git pull --rebase origin main
            git push
          fi
