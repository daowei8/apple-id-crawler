name: Apple ID Crawler

on:
  schedule:
    - cron: "0 */2 * * *"   # 每2小时运行（GitHub免费账号定时任务更可靠）
    - cron: "30 */2 * * *"  # 错开30分钟再跑一次，防止单次延迟漏掉
  workflow_dispatch:        # 支持手动触发
  push:
    branches: [main]        # 推送代码时也触发

concurrency:
  group: crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Chrome 浏览器
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫
        env:
          OUTPUT_FILE: apple_ids.json
        run: python scripts/crawler.py

      - name: 打印统计
        run: |
          python - <<'PYEOF'
          import json
          d = json.load(open("apple_ids.json"))
          print(f"📊 账号总数: {d['total']}")
          print(f"🕐 生成时间: {d['generated_at']}")
          print("📦 各站来源:")
          for src, cnt in d["source_stats"].items():
              print(f"   {src}: {cnt} 条")
          PYEOF

      - name: 提交数据到仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apple_ids.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            COUNT=$(python -c "import json; print(json.load(open('apple_ids.json'))['total'])")
            git commit -m "🤖 自动更新: ${COUNT} 个账号 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
